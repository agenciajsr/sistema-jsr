<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Mapa Mental — Sistema Agência JSR</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#0D0D0D;}
  svg{display:block;width:100%;height:auto;}
  .title{font-family:'Montserrat',sans-serif;font-weight:900;fill:#FFFFFF;letter-spacing:.5px;}
  .center-title{font-family:'Montserrat',sans-serif;font-weight:900;fill:#FFFFFF;letter-spacing:1px;}
  .center-sub{font-family:'Inter',sans-serif;font-weight:500;fill:#0099FF;letter-spacing:2px;}
  .item{font-family:'Inter',sans-serif;font-weight:400;fill:#B9C3CC;}
  .gap{font-family:'Inter',sans-serif;font-weight:700;fill:#F97316;}
  .done{font-family:'Inter',sans-serif;font-weight:700;fill:#22C55E;}
  .parcial{font-family:'Inter',sans-serif;font-weight:700;fill:#FFB020;}
  .num{font-family:'Montserrat',sans-serif;font-weight:900;fill:#0099FF;}
  .sig{font-family:'Inter',sans-serif;font-weight:700;fill:#5A6672;letter-spacing:2px;}
  .legend{font-family:'Inter',sans-serif;font-weight:500;fill:#8A959F;}
</style>
</head>
<body>
<svg viewBox="0 0 1700 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ctr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0099FF"/>
      <stop offset="100%" stop-color="#0057A8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1700" height="1200" fill="#0D0D0D"/>

  <!-- assinatura -->
  <text class="sig" x="40" y="26" font-size="12">JACSON RIBEIRO ——</text>
  <text class="sig" x="1660" y="26" font-size="12" text-anchor="end">SISTEMA JSR · MAPA OPERACIONAL</text>

  <!-- conectores -->
  <g fill="none" stroke="#0099FF" stroke-width="2" opacity="0.55">
    <path d="M680 590 C 560 590, 540 165, 420 165"/>
    <path d="M680 590 C 570 590, 540 465, 420 465"/>
    <path d="M680 590 C 570 590, 540 755, 420 755"/>
    <path d="M680 590 C 560 590, 540 1005, 420 1005"/>
    <path d="M1020 590 C 1140 590, 1160 140, 1280 140"/>
    <path d="M1020 590 C 1130 590, 1160 400, 1280 400"/>
    <path d="M1020 590 C 1140 590, 1160 645, 1280 645"/>
    <path d="M1020 590 C 1140 590, 1160 865, 1280 865"/>
    <path d="M850 660 L 850 1000" stroke-dasharray="6 6"/>
  </g>

  <!-- NÓ CENTRAL -->
  <g filter="url(#glow)">
    <rect x="680" y="520" width="340" height="140" rx="16" fill="url(#ctr)"/>
  </g>
  <text class="center-sub" x="850" y="558" font-size="11" text-anchor="middle">AGÊNCIA JSR</text>
  <text class="center-title" x="850" y="596" font-size="30" text-anchor="middle">SISTEMA</text>
  <text class="center-title" x="850" y="628" font-size="17" text-anchor="middle" opacity="0.9">OPERAÇÃO UNIFICADA</text>

  <!-- ===== ESQUERDA ===== -->

  <!-- 1 CAPTAÇÃO -->
  <rect x="40" y="40" width="380" height="250" rx="12" fill="#141618" stroke="#0099FF" stroke-width="1.5"/>
  <rect x="40" y="40" width="5" height="250" rx="2" fill="#0099FF"/>
  <text class="num" x="64" y="76" font-size="13">01</text>
  <text class="title" x="96" y="76" font-size="18">CAPTAÇÃO</text>
  <text class="item" x="64" y="112" font-size="14.5">› Formulário instantâneo Meta</text>
  <text class="item" x="64" y="136" font-size="14.5">› Landing page própria</text>
  <text class="item" x="64" y="160" font-size="14.5">› Campanha de WhatsApp</text>
  <text class="item" x="64" y="184" font-size="14.5">› Prospecção fria via WhatsApp</text>
  <text class="item" x="64" y="208" font-size="14.5">› Indicação e parcerias em eventos</text>
  <line x1="64" y1="226" x2="396" y2="226" stroke="#2A2E33" stroke-width="1"/>
  <text class="parcial" x="64" y="250" font-size="12.5">◐ Parcial: origem/UTM carimbada no lead</text>
  <text class="parcial" x="64" y="270" font-size="12.5">◐ Parcial: SLA de 1º contato</text>

  <!-- 2 CRM -->
  <rect x="40" y="320" width="380" height="290" rx="12" fill="#141618" stroke="#0099FF" stroke-width="1.5"/>
  <rect x="40" y="320" width="5" height="290" rx="2" fill="#0099FF"/>
  <text class="num" x="64" y="356" font-size="13">02</text>
  <text class="title" x="96" y="356" font-size="18">CRM · VENDAS</text>
  <text class="item" x="64" y="392" font-size="14.5">› Novo lead → Contato feito</text>
  <text class="item" x="64" y="416" font-size="14.5">› Qualificado → Reunião agendada</text>
  <text class="item" x="64" y="440" font-size="14.5">› Proposta enviada → Negociação</text>
  <text class="item" x="64" y="464" font-size="14.5">› Ganho / Perdido</text>
  <text class="item" x="64" y="488" font-size="14.5">› Atividades no card do lead</text>
  <text class="item" x="80" y="512" font-size="13.5" opacity="0.8">ligação · WhatsApp · e-mail · reunião</text>
  <line x1="64" y1="530" x2="396" y2="530" stroke="#2A2E33" stroke-width="1"/>
  <text class="done" x="64" y="554" font-size="12.5">✓ Motivo de perda estruturado</text>
  <text class="gap" x="64" y="574" font-size="12.5">⚠ Falta: reengajamento de perdidos</text>
  <text class="gap" x="64" y="594" font-size="12.5">⚠ Falta: score / temperatura do lead</text>

  <!-- 3 CONTRATO -->
  <rect x="40" y="640" width="380" height="230" rx="12" fill="#141618" stroke="#0099FF" stroke-width="1.5"/>
  <rect x="40" y="640" width="5" height="230" rx="2" fill="#0099FF"/>
  <text class="num" x="64" y="676" font-size="13">03</text>
  <text class="title" x="96" y="676" font-size="18">CONTRATO</text>
  <text class="item" x="64" y="712" font-size="14.5">› Tarefa · período · serviço · valor</text>
  <text class="item" x="64" y="736" font-size="14.5">› Link automático de formulário PF/PJ</text>
  <text class="item" x="64" y="760" font-size="14.5">› Aba de contratos recebidos</text>
  <text class="item" x="64" y="784" font-size="14.5">› Assinatura via Autentique</text>
  <line x1="64" y1="802" x2="396" y2="802" stroke="#2A2E33" stroke-width="1"/>
  <text class="gap" x="64" y="826" font-size="12.5">⚠ Falta: lembrete de assinatura pendente</text>
  <text class="done" x="64" y="846" font-size="12.5">✓ Templates por serviço</text>

  <!-- 4 PAGAMENTO -->
  <rect x="40" y="900" width="380" height="210" rx="12" fill="#141618" stroke="#0099FF" stroke-width="1.5"/>
  <rect x="40" y="900" width="5" height="210" rx="2" fill="#0099FF"/>
  <text class="num" x="64" y="936" font-size="13">04</text>
  <text class="title" x="96" y="936" font-size="18">PAGAMENTO</text>
  <text class="item" x="64" y="972" font-size="14.5">› Asaas conectado — E2E validado ✓</text>
  <text class="item" x="64" y="996" font-size="14.5">› 1ª cobrança pós-assinatura</text>
  <text class="item" x="64" y="1020" font-size="14.5">› Cliente vira ativo e pago</text>
  <line x1="64" y1="1038" x2="396" y2="1038" stroke="#2A2E33" stroke-width="1"/>
  <text class="gap" x="64" y="1062" font-size="12.5">⚠ Falta: régua de inadimplência</text>
  <text class="gap" x="64" y="1082" font-size="12.5">(antes · no vencimento · em atraso)</text>

  <!-- ===== DIREITA ===== -->

  <!-- 5 ONBOARDING -->
  <rect x="1280" y="40" width="380" height="200" rx="12" fill="#141618" stroke="#0099FF" stroke-width="1.5"/>
  <rect x="1655" y="40" width="5" height="200" rx="2" fill="#0099FF"/>
  <text class="num" x="1304" y="76" font-size="13">05</text>
  <text class="title" x="1336" y="76" font-size="18">ONBOARDING</text>
  <text class="item" x="1304" y="112" font-size="14.5">› Coleta de acessos do cliente</text>
  <text class="item" x="1304" y="136" font-size="14.5">› Reunião de onboarding</text>
  <text class="item" x="1304" y="160" font-size="14.5">› Configuração da conta Meta</text>
  <line x1="1304" y1="178" x2="1636" y2="178" stroke="#2A2E33" stroke-width="1"/>
  <text class="gap" x="1304" y="202" font-size="12.5">⚠ Falta: checklist padronizado por nicho</text>
  <text class="gap" x="1304" y="222" font-size="12.5">(estética · e-commerce · rifas · food)</text>

  <!-- 6 TRÁFEGO -->
  <rect x="1280" y="270" width="380" height="260" rx="12" fill="#141618" stroke="#0099FF" stroke-width="1.5"/>
  <rect x="1655" y="270" width="5" height="260" rx="2" fill="#0099FF"/>
  <text class="num" x="1304" y="306" font-size="13">06</text>
  <text class="title" x="1336" y="306" font-size="18">TRÁFEGO · PERFORMANCE</text>
  <text class="item" x="1304" y="342" font-size="14.5">› API Meta conectada</text>
  <text class="item" x="1304" y="366" font-size="14.5">› Contas de anúncio · campanhas · verba</text>
  <text class="item" x="1304" y="390" font-size="14.5">› Funil e métricas</text>
  <text class="item" x="1304" y="414" font-size="14.5">› Relatório semanal gerado automático</text>
  <line x1="1304" y1="432" x2="1636" y2="432" stroke="#2A2E33" stroke-width="1"/>
  <text class="gap" x="1304" y="456" font-size="12.5">⚠ Falta: disparo automático no WhatsApp</text>
  <text class="parcial" x="1304" y="476" font-size="12.5">◐ Parcial: alerta de pacing de verba</text>
  <text class="done" x="1304" y="496" font-size="12.5">✓ Alerta de fadiga de criativo</text>

  <!-- 7 FINANCEIRO -->
  <rect x="1280" y="560" width="380" height="190" rx="12" fill="#141618" stroke="#0099FF" stroke-width="1.5"/>
  <rect x="1655" y="560" width="5" height="190" rx="2" fill="#0099FF"/>
  <text class="num" x="1304" y="596" font-size="13">07</text>
  <text class="title" x="1336" y="596" font-size="18">FINANCEIRO</text>
  <text class="item" x="1304" y="632" font-size="14.5">› Recebido · a receber · a gastar</text>
  <line x1="1304" y1="650" x2="1636" y2="650" stroke="#2A2E33" stroke-width="1"/>
  <text class="done" x="1304" y="674" font-size="12.5">✓ MRR</text>
  <text class="gap" x="1304" y="694" font-size="12.5">⚠ Falta: LTV médio</text>
  <text class="gap" x="1304" y="714" font-size="12.5">⚠ Falta: CAC por canal de captação</text>
  <text class="gap" x="1304" y="734" font-size="12.5">⚠ Falta: ligação direta com o CRM</text>

  <!-- 8 AGENDA -->
  <rect x="1280" y="760" width="380" height="210" rx="12" fill="#141618" stroke="#0099FF" stroke-width="1.5"/>
  <rect x="1655" y="760" width="5" height="210" rx="2" fill="#0099FF"/>
  <text class="num" x="1304" y="796" font-size="13">08</text>
  <text class="title" x="1336" y="796" font-size="18">AGENDA · TAREFAS</text>
  <text class="item" x="1304" y="832" font-size="14.5">› Google Agenda integrado</text>
  <text class="item" x="1304" y="856" font-size="14.5">› Atividade de reunião → agenda</text>
  <text class="item" x="1304" y="880" font-size="14.5">› Tarefas operacionais da agência</text>
  <line x1="1304" y1="898" x2="1636" y2="898" stroke="#2A2E33" stroke-width="1"/>
  <text class="done" x="1304" y="922" font-size="12.5">✓ Atividade de reunião entra na</text>
  <text class="done" x="1304" y="942" font-size="12.5">agenda automaticamente</text>

  <!-- BANDA TRANSVERSAL -->
  <rect x="460" y="1000" width="780" height="120" rx="12" fill="#101B24" stroke="#FFB020" stroke-width="1.5"/>
  <text class="title" x="850" y="1032" font-size="16" text-anchor="middle" fill="#FFB020">CAMADAS TRANSVERSAIS — EM CONSTRUÇÃO</text>
  <text class="item" x="850" y="1062" font-size="14" text-anchor="middle"><tspan fill="#F97316">Dashboard executivo (CAC · LTV · MRR · churn)</tspan>  ·  <tspan fill="#FFB020">◐ Saúde e retenção de conta</tspan></text>
  <text class="item" x="850" y="1086" font-size="14" text-anchor="middle" fill="#F97316">Permissões por papel (você · Judson · futuros clientes do sistema)</text>
  <text class="item" x="850" y="1108" font-size="12.5" text-anchor="middle" fill="#5A6672">pré-requisito para vender o sistema a outras agências</text>

  <!-- LEGENDA -->
  <g>
    <rect x="40" y="1150" width="14" height="14" rx="3" fill="#22C55E"/>
    <text class="legend" x="62" y="1162" font-size="12.5">feito</text>
    <rect x="240" y="1150" width="14" height="14" rx="3" fill="#FFB020"/>
    <text class="legend" x="262" y="1162" font-size="12.5">parcial</text>
    <rect x="440" y="1150" width="14" height="14" rx="3" fill="#F97316"/>
    <text class="legend" x="462" y="1162" font-size="12.5">pendente</text>
  </g>
  <text class="sig" x="1660" y="1162" font-size="11" text-anchor="end">GESTOR DE TRÁFEGO</text>
</svg>
</body>
</html>
